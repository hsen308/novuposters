  header { padding:36px 60px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }

  .logo-text h1 { font-family:"Arial Black",sans-serif; font-size:22px; letter-spacing:3px; color:var(--text); }
  .logo-text p { font-family:monospace; font-size:12px; color:var(--muted); letter-spacing:2px; margin-top:3px; }
  .header-right { display:flex; gap:12px; align-items:center; }
  .btn { padding:12px 24px; font-family:monospace; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border:none; transition:all .2s; }
  .btn-lime { background:var(--lime); color:var(--bg); font-weight:700; }
  .btn-lime:hover { filter:brightness(1.1); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-outline:hover { border-color:var(--lime); color:var(--lime); }
  .info-strip { padding:16px 60px; border-bottom:1px solid var(--border); display:flex; gap:40px; font-family:monospace; font-size:12px; letter-spacing:2px; color:var(--muted); }

  .controls { padding:24px 60px; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .filter-btn { padding:8px 20px; font-family:monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; background:transparent; border:1px solid var(--border); color:var(--muted); transition:all .2s; }
  .filter-btn.active, .filter-btn:hover { border-color:var(--lime); color:var(--lime); }
  .filter-btn.active { background:rgba(200,255,0,0.05); }
  .grid { padding:40px 60px 120px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:24px; }
  .poster-card { background:var(--border); border:1px solid #1a1a1a; overflow:hidden; transition:all .3s ease; cursor:pointer; }
  .poster-card:hover { border-color:var(--lime); transform:translateY(-4px); box-shadow:0 12px 40px rgba(200,255,0,0.1); }
  .poster-preview { width:100%; aspect-ratio:4/5; overflow:hidden; background:#080808; }
  .poster-preview svg { width:100%; height:100%; display:block; }
  .card-footer { padding:14px 16px; border-top:1px solid #1a1a1a; display:flex; align-items:center; justify-content:space-between; }
  .card-num { font-family:monospace; font-size:11px; color:var(--muted); letter-spacing:2px; }
  .card-title { font-family:"Arial Black",sans-serif; font-size:12px; color:var(--text); margin-top:2px; max-width:180px; }
  .card-tag { font-family:monospace; font-size:10px; color:var(--lime); letter-spacing:1px; background:rgba(200,255,0,0.08); padding:3px 8px; }
  .dl-icon { width:32px; height:32px; background:var(--lime); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; font-size:14px; }
  .dl-icon:hover { filter:brightness(1.15); transform:scale(1.08); }
  .download-all-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(8,8,8,0.95); border-top:1px solid var(--border); padding:20px 60px; display:flex; align-items:center; justify-content:space-between; backdrop-filter:blur(10px); z-index:500; }
  .dl-bar-text { font-family:monospace; font-size:13px; color:var(--muted); letter-spacing:2px; }
  .dl-bar-text strong { color:var(--lime); }

  const f = lightBg ? B.bg : '#f0ede6';
  const cf = lightBg ? 'rgba(0,0,0,0.15)' : '#111';
  const cs = lightBg ? 'rgba(0,0,0,0.2)' : '#1e1e1e';
  return `<circle cx="${cx}" cy="${cy}" r="${52*s}" fill="${cf}" stroke="${cs}" stroke-width="1"/>
  <rect x="${t(27)}" y="${u(26)}" width="${14*s}" height="${58*s}" rx="${2*s}" fill="${f}"/>
  <rect x="${t(69)}" y="${u(26)}" width="${14*s}" height="${58*s}" rx="${2*s}" fill="${f}"/>

// ── PNG DOWNLOAD
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

async function svgToPng(svgStr, filename) {
  return new Promise((res,rej)=>{
    const blob = new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement('canvas');
      c.width=1080; c.height=1350;
      c.getContext('2d').drawImage(img,0,0,1080,1350);
      URL.revokeObjectURL(url);
      c.toBlob(b=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(b); a.download=filename; a.click();
        res();
      },'image/png');
    };
    img.onerror=rej; img.src=url;
  });
}

async function downloadPNG(p) {
  showToast(`DOWNLOADING NO.${String(p.id).padStart(2,'0')}...`);
  await svgToPng(p.svg(), `novustudios-${String(p.id).padStart(2,'0')}-${p.tag.toLowerCase().replace(/\s+/g,'-')}.png`);
}

async function downloadSelected() {
  if(!selectedIds.size){alert('Click posters to select them first.');return;}
  const list=posters.filter(p=>selectedIds.has(p.id));
  showToast(`DOWNLOADING ${list.length} POSTERS...`);
  for(let i=0;i<list.length;i++){await new Promise(r=>setTimeout(r,320));await downloadPNG(list[i]);}
}

async function downloadAllPNGs() {
  showToast('DOWNLOADING ALL 30...');
  for(let i=0;i<posters.length;i++){await new Promise(r=>setTimeout(r,320));await downloadPNG(posters[i]);}
}

function selectAll(){
  posters.forEach(p=>selectedIds.add(p.id));
  document.getElementById('selectedCount').textContent=selectedIds.size+' SELECTED';
  render();
}

// ── GRID
let selectedIds=new Set(), activeFilter='all';

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const filtered=activeFilter==='all'?posters:posters.filter(p=>p.cat===activeFilter);
  filtered.forEach(p=>{
    const card=document.createElement('div');
    card.className='poster-card';
    if(selectedIds.has(p.id)) card.style.borderColor='#c8ff00';
    card.innerHTML=`
      <div class="poster-preview">${p.svg()}</div>
      <div class="card-footer">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
            <span class="card-num">NO.${String(p.id).padStart(2,'0')}</span>
            <span class="card-tag">${p.tag}</span>
          </div>
          <div class="card-title">${p.title}</div>
        </div>
        <button class="dl-icon" title="Download PNG">↓</button>
      </div>`;
    card.querySelector('.dl-icon').addEventListener('click',e=>{e.stopPropagation();downloadPNG(p);});
    card.addEventListener('click',()=>{
      if(selectedIds.has(p.id)){selectedIds.delete(p.id);card.style.borderColor='';}
      else{selectedIds.add(p.id);card.style.borderColor='#c8ff00';}
      document.getElementById('selectedCount').textContent=selectedIds.size+' SELECTED';
    });
    grid.appendChild(card);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.filter;
    render();
  });
});

render();
</script>
